<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="robots" content="noindex, nofollow">
    <title>Samar Planner</title>
    <base href="/" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    
    <!-- فایل‌های CSS از RCL -->
    <link href="_content/SamarPlanner.Web.Shared/css/app.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/custom.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/theme-dark.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/Layout/TaskLayout.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/Layout/GoalLayout.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/Layout/MainLayout.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/Layout/ReportLayout.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/components.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-daily.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-weekly.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-goals.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-deleted.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-reports.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-auth.css" rel="stylesheet" />
    <link href="_content/SamarPlanner.Web.Shared/css/pages-note.css" rel="stylesheet" />

    <!-- پکیج toast (دست نزن) -->
    <link href="_content/ANM.Blazored.Toast/blazored-toast.css" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div id="app">
    <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%" />
        <circle r="40%" cx="50%" cy="50%" />
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="" class="reload">Reload</a>
    <a class="dismiss">🗙</a>
</div>

<!-- فایل‌های JS از RCL -->
<script src="_content/SamarPlanner.Web.Shared/js/theme.js"></script>
<script src="_content/SamarPlanner.Web.Shared/js/fileHelper.js"></script>

<script src="_framework/blazor.webassembly.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    window.addEventListener('error', function (event) {
        if (window.DotNet) {
            DotNet.invokeMethodAsync('SamarPlanner.Web', 'LogJsError',
                event.message, event.filename, event.lineno?.toString());
        }
    });

    window.addEventListener('unhandledrejection', function (event) {
        if (window.DotNet) {
            DotNet.invokeMethodAsync('SamarPlanner.Web', 'LogJsError',
                event.reason?.toString() ?? 'Unhandled Promise Rejection', '', '');
        }
    });
</script>
</body>
</html>
